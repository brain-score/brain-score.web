name: Deploy to Elastic Beanstalk
description: Point an EB environment at an existing application version and wait for it to stabilize.

inputs:
  application-name:
    description: Elastic Beanstalk application name.
    required: true
  environment-name:
    description: Elastic Beanstalk environment name to update.
    required: true
  version-label:
    description: Existing EB application version label to deploy.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        aws elasticbeanstalk update-environment \
          --application-name "${{ inputs.application-name }}" \
          --environment-name "${{ inputs.environment-name }}" \
          --version-label "${{ inputs.version-label }}"
        aws elasticbeanstalk wait environment-updated \
          --application-name "${{ inputs.application-name }}" \
          --environment-name "${{ inputs.environment-name }}"
